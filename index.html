const C = {

function Pill({ label, color, small }) {
  return (
    <span style={{ fontSize: small ? 9 : 10, fontWeight: 700, padding: small ? "2px 6px" : "3px 9px", borderRadius: 20, background: color + "22", color, border: `1px solid ${color}44`, whiteSpace: "nowrap" }}>
      {label}
    </span>
  );
}

function SecHead({ icon, label, color }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
      <div style={{ width: 34, height: 34, borderRadius: 10, background: color + "20", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17, flexShrink: 0 }}>{icon}</div>
      <span style={{ fontSize: 15, fontWeight: 800, color: C.text, letterSpacing: "-0.3px", flex: 1 }}>{label}</span>
      <div style={{ height: 1, width: 40, background: color + "40" }} />
    </div>
  );
}

function renderSec(sec, color) {
  if (sec.type === "cards") {
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {sec.items.map((item, i) => (
          <div key={i} style={{ background: C.card, border: `1px solid ${color}22`, borderLeft: `4px solid ${color}`, borderRadius: "0 12px 12px 0", padding: "13px 15px", display: "flex", gap: 12, alignItems: "flex-start" }}>

          </div>
        ))}
      </div>

  if (sec.type === "versus") {
    return (
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>

          <div key={si} style={{ background: C.card, border: `1px solid ${side.color}33`, borderRadius: 14, overflow: "hidden" }}>

function ProgressRing({ pct, size = 54, stroke = 5, color = "#0078d4" }) {
  const r = (size - stroke * 2) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return (
    <svg width={size} height={size}>
      <circle cx={size / 2} cy={size / 2} r={r} stroke="#1e2a3a" strokeWidth={stroke} fill="none" />
      <circle cx={size / 2} cy={size / 2} r={r} stroke={color} strokeWidth={stroke} fill="none"
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{ transform: "rotate(-90deg)", transformOrigin: "50% 50%", transition: "stroke-dashoffset .5s" }} />
      <text x="50%" y="50%" textAnchor="middle" dy=".35em" fill="#e2eaf4" fontSize={size * 0.2} fontWeight="700">{pct}%</text>
    </svg>
  );
}

function FlashcardsView({ onSeen }) {
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [seen, setSeen] = useState(new Set([0]));

  const go = (newIdx) => {
    setIdx(newIdx);
    setFlipped(false);
    const s = new Set(seen).add(newIdx);
    setSeen(s);
    onSeen(s.size);
  };

  const card = FLASHCARDS[idx];
  const pct = Math.round((seen.size / FLASHCARDS.length) * 100);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div>
          <h2 style={{ color: C.text, fontSize: 20, fontWeight: 900, margin: "0 0 2px" }}>🃏 Flashcards</h2>
          <p style={{ color: C.faint, fontSize: 13, margin: 0 }}>{idx + 1} of {FLASHCARDS.length} · {seen.size} reviewed</p>
        </div>
        <button onClick={() => go(Math.floor(Math.random() * FLASHCARDS.length))}
          style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 9, color: C.muted, padding: "8px 14px", cursor: "pointer", fontSize: 13 }}>🔀</button>
      </div>

      <div onClick={() => setFlipped(!flipped)}
        style={{ cursor: "pointer", marginBottom: 18, minHeight: 200, background: flipped ? "linear-gradient(135deg, #003260, #004e8c)" : C.card, border: `2px solid ${flipped ? "#0078d4" : C.border}`, borderRadius: 18, padding: "28px 24px", display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", transition: "all .3s", position: "relative" }}>
        <span style={{ position: "absolute", top: 14, right: 16, fontSize: 11, color: C.faint }}>{flipped ? "✅ Answer" : "❓ Question"} · tap to flip</span>
        <div style={{ fontSize: 15, color: C.text, textAlign: "center", lineHeight: 1.7, fontWeight: flipped ? 400 : 600 }}>
          {flipped ? card.a : card.q}
        </div>
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
        <button onClick={() => go((idx - 1 + FLASHCARDS.length) % FLASHCARDS.length)}
          style={{ flex: 1, background: C.card, border: `1px solid ${C.border}`, borderRadius: 11, color: C.muted, padding: "12px", cursor: "pointer", fontSize: 15 }}>←</button>
        {!flipped && (
          <button onClick={() => setFlipped(true)}
            style={{ flex: 2, background: "#0078d4", border: "none", borderRadius: 11, color: "#fff", padding: "12px", cursor: "pointer", fontWeight: 700, fontSize: 14 }}>Reveal Answer</button>
        )}
        <button onClick={() => go((idx + 1) % FLASHCARDS.length)}
          style={{ flex: 1, background: C.card, border: `1px solid ${C.border}`, borderRadius: 11, color: C.muted, padding: "12px", cursor: "pointer", fontSize: 15 }}>→</button>
      </div>

      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 11, padding: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 7 }}>
          <span style={{ fontSize: 12, color: C.faint }}>Progress</span>
          <span style={{ fontSize: 12, color: "#00b294", fontWeight: 700 }}>{pct}%</span>
        </div>
        <div style={{ background: "#050e1a", borderRadius: 4, height: 6, overflow: "hidden" }}>
          <div style={{ background: "linear-gradient(90deg, #00b29477, #00b294)", height: "100%", width: `${pct}%`, borderRadius: 4, transition: "width .3s" }} />
        </div>
      </div>
    </div>
  );
}

function QuizView({ onScore }) {
  const [started, setStarted] = useState(false);
  const [questions, setQuestions] = useState([]);
  const [qIdx, setQIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showExp, setShowExp] = useState(false);
  const [results, setResults] = useState([]);
  const [finished, setFinished] = useState(false);

  const start = (qs) => {
    setQuestions(qs); setQIdx(0); setSelected(null);
    setShowExp(false); setResults([]); setFinished(false); setStarted(true);
  };

  const handleSelect = (i) => {
    if (selected !== null) return;
    setSelected(i);
    setShowExp(true);
    const correct = i === questions[qIdx].answer;
    const newR = [...results, { correct }];
    setResults(newR);
    onScore({ correct: newR.filter(r => r.correct).length, total: newR.length });
  };

  const next = () => {
    if (qIdx + 1 >= questions.length) { setFinished(true); return; }
    setQIdx(qIdx + 1); setSelected(null); setShowExp(false);
  };

  if (!started) {
    return (
      <div>
        <h2 style={{ color: C.text, fontSize: 20, fontWeight: 900, margin: "0 0 4px" }}>📝 Quiz Mode</h2>
        <p style={{ color: C.faint, fontSize: 13, margin: "0 0 24px" }}>200 practice questions with instant explanations</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <button onClick={() => start(QUIZZES)}
            style={{ background: "#0078d4", border: "none", borderRadius: 14, color: "#fff", padding: "18px 20px", cursor: "pointer", textAlign: "left", fontWeight: 800, fontSize: 16 }}>
            🎯 Full Exam — All 200 Questions
          </button>
          {[25, 50, 100].map(n => (
            <button key={n} onClick={() => start([...QUIZZES].sort(() => Math.random() - .5).slice(0, n))}
              style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 13, color: C.text, padding: "15px 20px", cursor: "pointer", textAlign: "left", fontSize: 15 }}
              onMouseEnter={e => e.currentTarget.style.borderColor = "#0078d4"}
              onMouseLeave={e => e.currentTarget.style.borderColor = C.border}>
              🎲 Random Quiz — {n} Questions
            </button>
          ))}
        </div>
      </div>
    );
  }

  if (finished) {
    const correct = results.filter(r => r.correct).length;
    const pct = Math.round((correct / results.length) * 100);
    const passed = pct >= 70;
    return (
      <div style={{ textAlign: "center" }}>
        <div style={{ fontSize: 64, marginBottom: 16 }}>{passed ? "🎉" : "📚"}</div>
        <h2 style={{ color: C.text, fontSize: 22, fontWeight: 900, marginBottom: 8 }}>{passed ? "Excellent Work!" : "Keep Studying!"}</h2>
        <div style={{ fontSize: 52, fontWeight: 900, color: passed ? "#00b294" : "#f0ad4e", marginBottom: 6 }}>{pct}%</div>
        <p style={{ color: C.muted, fontSize: 15, marginBottom: 24 }}>{correct} out of {results.length} correct</p>
        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 13, padding: 16, marginBottom: 24, textAlign: "left" }}>
          <p style={{ color: C.muted, fontSize: 13, margin: 0, lineHeight: 1.6 }}>
            {passed ? "✅ Scoring above 70% — looking strong! Keep reviewing weak areas, especially Azure Architecture (35-40% of exam)." : "⚠️ AZ-900 passing score is ~700/1000 (~70%). Review the Study Guide topics and try flashcards to reinforce key concepts."}
          </p>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={() => start(QUIZZES)} style={{ flex: 1, background: "#0078d4", border: "none", borderRadius: 11, color: "#fff", padding: "13px", cursor: "pointer", fontWeight: 700 }}>All 200 Again</button>
          <button onClick={() => setStarted(false)} style={{ flex: 1, background: C.card, border: `1px solid ${C.border}`, borderRadius: 11, color: C.muted, padding: "13px", cursor: "pointer" }}>Menu</button>
        </div>
      </div>
    );
  }

  const q = questions[qIdx];
  const correct = results.filter(r => r.correct).length;
  const wrong = results.filter(r => !r.correct).length;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <span style={{ color: C.faint, fontSize: 13 }}>Q {qIdx + 1} / {questions.length}</span>
        <span style={{ fontSize: 13 }}><span style={{ color: "#00b294" }}>✅ {correct}</span> <span style={{ color: C.faint }}>·</span> <span style={{ color: "#e74c3c" }}>❌ {wrong}</span></span>
      </div>
      <div style={{ background: "#050e1a", borderRadius: 4, height: 4, marginBottom: 18, overflow: "hidden" }}>
        <div style={{ background: "#0078d4", height: "100%", width: `${(qIdx / questions.length) * 100}%`, transition: "width .3s" }} />
      </div>

      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "18px", marginBottom: 14 }}>
        <p style={{ margin: 0, color: C.text, fontSize: 15, lineHeight: 1.7, fontWeight: 600 }}>{q.q}</p>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 14 }}>
        {q.options.map((opt, i) => {
          let bg = C.card, border = C.border, textColor = C.muted;
          if (selected !== null) {
            if (i === q.answer) { bg = "#002d1a"; border = "#00b294"; textColor = "#00e5a0"; }
            else if (i === selected && i !== q.answer) { bg = "#2d0a0a"; border = "#e74c3c"; textColor = "#ff7070"; }
            else { textColor = C.faint; }
          }
          return (
            <button key={i} onClick={() => handleSelect(i)}
              style={{ background: bg, border: `1.5px solid ${border}`, borderRadius: 11, padding: "13px 16px", cursor: selected !== null ? "default" : "pointer", textAlign: "left", color: textColor, fontSize: 14, lineHeight: 1.5, transition: "all .15s", display: "flex", alignItems: "flex-start", gap: 10 }}>
              <span style={{ fontWeight: 800, minWidth: 22, fontSize: 13 }}>{["A", "B", "C", "D"][i]}.</span>
              <span style={{ flex: 1 }}>{opt}</span>
              {selected !== null && i === q.answer && <span>✅</span>}
              {selected !== null && i === selected && i !== q.answer && <span>❌</span>}
            </button>
          );
        })}
      </div>

      {showExp && (
        <div style={{ background: "#001830", border: "1px solid #0078d444", borderRadius: 13, padding: "13px 16px", marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: "#0078d4", fontWeight: 800, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.5px" }}>💡 Explanation</div>
          <p style={{ margin: 0, color: C.muted, fontSize: 13, lineHeight: 1.65 }}>{q.exp}</p>
        </div>
      )}

      {selected !== null && (
        <button onClick={next}
          style={{ width: "100%", background: "#0078d4", border: "none", borderRadius: 11, color: "#fff", padding: "14px", cursor: "pointer", fontWeight: 800, fontSize: 15 }}>
          {qIdx + 1 >= questions.length ? "See Results 🏆" : "Next Question →"}
        </button>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
